<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helicopter Animation Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #e0e0e0;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 3rem 2rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-align: center;
    margin-bottom: 3rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .panel-label {
    font-size: 0.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  /* ── PANEL A: Industrial Dark ── */
  .panel-a { background: #060d1a; padding: 3rem 2rem; }
  .panel-a .panel-label { color: #00b4ff; }

  /* ── PANEL B: Daylight Sky ── */
  .panel-b {
    background: linear-gradient(175deg, #c8e8f8 0%, #7abfed 50%, #3a9fd8 100%);
    padding: 3rem 2rem;
  }
  .panel-b .panel-label { color: #0f2340; }

  /* ── PANEL C: Luxury Dark ── */
  .panel-c { background: #08080a; padding: 3rem 2rem; }
  .panel-c .panel-label { color: #c9a84c; }
</style>
</head>
<body>

<h1>Helicopter Animation Concepts</h1>

<div class="grid">

  <!-- ══════════════════════════════════════════
       OPTION A — INDUSTRIAL / DARK / ELECTRIC
  ══════════════════════════════════════════ -->
  <div class="panel panel-a">
    <div class="panel-label">A — Industrial</div>

    <svg viewBox="0 0 300 500" width="300" height="500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Blueprint grid -->
        <pattern id="grid-a" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,180,255,0.06)" stroke-width="0.5"/>
        </pattern>
        <!-- Glow filters -->
        <filter id="glow-a" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-rotor-a" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="line-grad-a" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00b4ff" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#00b4ff" stop-opacity="0.15"/>
        </linearGradient>
        <linearGradient id="fuselage-a" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a6a88"/>
          <stop offset="100%" stop-color="#1e3248"/>
        </linearGradient>
        <linearGradient id="body-a" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a4a66"/>
          <stop offset="100%" stop-color="#0e2236"/>
        </linearGradient>
      </defs>

      <!-- Blueprint grid background -->
      <rect width="300" height="500" fill="url(#grid-a)"/>

      <!-- Electric accent lines -->
      <line x1="0" y1="420" x2="300" y2="420" stroke="rgba(0,180,255,0.12)" stroke-width="1"/>
      <line x1="150" y1="0" x2="150" y2="500" stroke="rgba(0,180,255,0.05)" stroke-width="1"/>

      <!-- HELICOPTER — floats vertically -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 0,-14; 0,-8; 0,-16; 0,0"
          keyTimes="0; 0.3; 0.55; 0.75; 1"
          dur="5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45,0,0.55,1; 0.45,0,0.55,1; 0.45,0,0.55,1; 0.45,0,0.55,1"/>

        <!-- Rotor mast -->
        <rect x="147" y="98" width="6" height="18" fill="#2a4a66"/>

        <!-- Main rotor hub -->
        <circle cx="150" cy="96" r="7" fill="#3a5a78" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.6" filter="url(#glow-a)"/>

        <!-- Rotor blades — spin around (150,96) -->
        <g filter="url(#glow-rotor-a)">
          <rect x="20" y="93" width="260" height="6" rx="3" fill="#5a8aaa" opacity="0.85"/>
          <rect x="147" y="−34" width="6" height="260" rx="3" fill="#5a8aaa" opacity="0.85"/>
          <animateTransform attributeName="transform" type="rotate"
            from="0 150 96" to="360 150 96" dur="1.2s" repeatCount="indefinite"/>
        </g>
        <circle cx="150" cy="96" r="5" fill="#1a3a58" stroke="#00b4ff" stroke-width="1" stroke-opacity="0.8"/>

        <!-- Fuselage — main body -->
        <ellipse cx="150" cy="148" rx="68" ry="26" fill="url(#fuselage-a)" stroke="#2a5a7a" stroke-width="0.5"/>

        <!-- Cockpit glazing -->
        <ellipse cx="120" cy="140" rx="30" ry="22" fill="#0a1e32" opacity="0.9"/>
        <ellipse cx="116" cy="137" rx="18" ry="13" fill="#0d2844" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.4"/>
        <!-- Cockpit reflection -->
        <ellipse cx="111" cy="132" rx="8" ry="5" fill="rgba(0,180,255,0.08)" transform="rotate(-20,111,132)"/>

        <!-- Body section -->
        <rect x="140" y="126" width="66" height="38" rx="6" fill="url(#body-a)" stroke="#1a3a56" stroke-width="0.5"/>

        <!-- Panel lines -->
        <line x1="155" y1="126" x2="155" y2="164" stroke="rgba(0,180,255,0.15)" stroke-width="0.5"/>
        <line x1="175" y1="126" x2="175" y2="164" stroke="rgba(0,180,255,0.15)" stroke-width="0.5"/>
        <line x1="140" y1="145" x2="206" y2="145" stroke="rgba(0,180,255,0.1)" stroke-width="0.5"/>

        <!-- Exhaust port -->
        <rect x="198" y="128" width="8" height="6" rx="1" fill="#0a1e2e"/>
        <rect x="198" y="128" width="8" height="2" fill="#00b4ff" opacity="0.3"/>

        <!-- Tail boom -->
        <path d="M200 148 Q240 148 268 138 L268 152 Q240 160 200 160 Z" fill="#1a3248" stroke="#1e4060" stroke-width="0.5"/>
        <line x1="200" y1="150" x2="268" y2="143" stroke="rgba(0,180,255,0.1)" stroke-width="0.5"/>

        <!-- Tail fin vertical -->
        <path d="M264 138 L270 110 L276 138" fill="#152840" stroke="#1e4060" stroke-width="0.5"/>
        <line x1="270" y1="112" x2="270" y2="138" stroke="rgba(0,180,255,0.15)" stroke-width="0.5"/>

        <!-- Tail rotor hub -->
        <circle cx="270" cy="138" r="5" fill="#1a3a56" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.5"/>
        <!-- Tail rotor blades -->
        <g>
          <rect x="267" y="116" width="6" height="44" rx="2" fill="#3a6080" opacity="0.7"/>
          <rect x="249" y="135" width="42" height="6" rx="2" fill="#3a6080" opacity="0.7"/>
          <animateTransform attributeName="transform" type="rotate"
            from="0 270 138" to="360 270 138" dur="0.4s" repeatCount="indefinite"/>
        </g>

        <!-- Skid struts -->
        <line x1="120" y1="170" x2="110" y2="192" stroke="#2a4a66" stroke-width="2.5"/>
        <line x1="180" y1="168" x2="190" y2="192" stroke="#2a4a66" stroke-width="2.5"/>
        <!-- Skid bar -->
        <rect x="98" y="190" width="104" height="5" rx="2.5" fill="#1e3a56" stroke="#2a5a7a" stroke-width="0.5"/>
        <!-- Skid feet -->
        <rect x="92" y="192" width="22" height="3" rx="1.5" fill="#2a4a66"/>
        <rect x="186" y="192" width="22" height="3" rx="1.5" fill="#2a4a66"/>

        <!-- LONG LINE — swings from skid centre -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="0 150 192; 1.8 150 192; 0 150 192; -1.8 150 192; 0 150 192"
            dur="4s" repeatCount="indefinite" calcMode="spline"
            keySplines="0.45,0,0.55,1;0.45,0,0.55,1;0.45,0,0.55,1;0.45,0,0.55,1"/>

          <!-- Cable -->
          <line x1="150" y1="192" x2="150" y2="390" stroke="url(#line-grad-a)" stroke-width="1.5"/>
          <!-- Cable highlight -->
          <line x1="151" y1="192" x2="151" y2="390" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

          <!-- Swivel body — the actual product -->
          <rect x="138" y="262" width="24" height="50" rx="7" fill="#1a3a56" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.6" filter="url(#glow-a)"/>
          <rect x="141" y="265" width="18" height="44" rx="5" fill="#243e58"/>
          <!-- Swivel rings — rotary contact detail -->
          <line x1="138" y1="276" x2="162" y2="276" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.5"/>
          <line x1="138" y1="284" x2="162" y2="284" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.3"/>
          <line x1="138" y1="292" x2="162" y2="292" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.3"/>
          <line x1="138" y1="300" x2="162" y2="300" stroke="#00b4ff" stroke-width="0.5" stroke-opacity="0.5"/>
          <!-- Swivel pin connectors -->
          <circle cx="150" cy="262" r="5" fill="#0e2236" stroke="#00b4ff" stroke-width="0.8" stroke-opacity="0.7"/>
          <circle cx="150" cy="312" r="5" fill="#0e2236" stroke="#00b4ff" stroke-width="0.8" stroke-opacity="0.7"/>

          <!-- Load box -->
          <rect x="122" y="390" width="56" height="44" rx="3" fill="#152840" stroke="#1e3a56" stroke-width="0.5"/>
          <rect x="125" y="393" width="50" height="38" rx="2" fill="#1a3248"/>
          <!-- Load detail lines -->
          <line x1="122" y1="411" x2="178" y2="411" stroke="rgba(0,180,255,0.12)" stroke-width="0.5"/>
          <line x1="150" y1="390" x2="150" y2="434" stroke="rgba(0,180,255,0.08)" stroke-width="0.5"/>
          <!-- Electric blue accent on load -->
          <rect x="122" y="390" width="56" height="2" fill="#00b4ff" opacity="0.4"/>

          <!-- Rigging -->
          <line x1="132" y1="390" x2="132" y2="374" stroke="#1a3a56" stroke-width="1.5"/>
          <line x1="168" y1="390" x2="168" y2="374" stroke="#1a3a56" stroke-width="1.5"/>
          <line x1="132" y1="374" x2="168" y2="374" stroke="#1a3a56" stroke-width="1.5"/>
          <line x1="150" y1="374" x2="150" y2="390" stroke="#1a3a56" stroke-width="1.5"/>
        </g>
      </g>
    </svg>
  </div>


  <!-- ══════════════════════════════════════════
       OPTION B — CLEAN / DAYLIGHT / PROFESSIONAL
  ══════════════════════════════════════════ -->
  <div class="panel panel-b">
    <div class="panel-label">B — Professional</div>

    <svg viewBox="0 0 300 500" width="300" height="500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="shadow-b">
          <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(15,35,64,0.25)"/>
        </filter>
        <filter id="shadow-b-soft">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(15,35,64,0.15)"/>
        </filter>
        <linearGradient id="fuse-b" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8f4ff"/>
          <stop offset="60%" stop-color="#c8dff0"/>
          <stop offset="100%" stop-color="#8ab8d8"/>
        </linearGradient>
        <linearGradient id="body-b" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1e6eb5"/>
          <stop offset="100%" stop-color="#0f3d6e"/>
        </linearGradient>
        <linearGradient id="cable-b" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f2340" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#0f2340" stop-opacity="0.2"/>
        </linearGradient>
      </defs>

      <!-- Subtle cloud puffs -->
      <ellipse cx="60" cy="80" rx="70" ry="22" fill="white" opacity="0.5"/>
      <ellipse cx="240" cy="120" rx="55" ry="18" fill="white" opacity="0.4"/>
      <ellipse cx="40" cy="280" rx="45" ry="14" fill="white" opacity="0.3"/>

      <!-- HELICOPTER -->
      <g filter="url(#shadow-b)">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 0,-12; 0,-5; 0,-14; 0,0"
          keyTimes="0; 0.35; 0.6; 0.78; 1"
          dur="5.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1"/>

        <!-- Rotor mast -->
        <rect x="147" y="100" width="6" height="20" rx="1" fill="#1a4a7a"/>

        <!-- Rotor hub -->
        <circle cx="150" cy="98" r="8" fill="#163354" stroke="#2d6ea8" stroke-width="1.5"/>
        <circle cx="150" cy="98" r="3" fill="#0f2340"/>

        <!-- Rotor blades -->
        <g>
          <rect x="18" y="95" width="264" height="7" rx="3.5" fill="rgba(15,35,64,0.65)"/>
          <rect x="147" y="-34" width="7" height="264" rx="3.5" fill="rgba(15,35,64,0.65)"/>
          <animateTransform attributeName="transform" type="rotate"
            from="0 150 98" to="360 150 98" dur="1.2s" repeatCount="indefinite"/>
        </g>
        <!-- Hub cap -->
        <circle cx="150" cy="98" r="6" fill="#163354" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

        <!-- Fuselage — rounded, modern -->
        <path d="M82 148 Q82 118 118 116 L182 116 Q218 116 218 148 Q218 172 182 174 L118 174 Q82 174 82 148 Z" fill="url(#fuse-b)" stroke="rgba(15,35,64,0.1)" stroke-width="0.5"/>

        <!-- Cockpit — large wraparound glass -->
        <path d="M84 148 Q84 122 114 120 L148 118 L148 174 L114 174 Q84 172 84 148 Z" fill="#0f2340" opacity="0.85"/>
        <!-- Cockpit reflections -->
        <path d="M92 130 Q100 122 118 120 L130 120 L130 140 Q112 138 92 130 Z" fill="rgba(255,255,255,0.12)"/>
        <path d="M86 152 Q88 142 96 136 L96 158 Q88 160 86 152 Z" fill="rgba(255,255,255,0.07)"/>

        <!-- Body accent stripe -->
        <rect x="148" y="116" width="70" height="3" rx="1.5" fill="#1e6eb5" opacity="0.6"/>

        <!-- Body panel -->
        <rect x="148" y="119" width="70" height="55" rx="5" fill="url(#body-b)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <!-- Panel detail -->
        <line x1="165" y1="119" x2="165" y2="174" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
        <line x1="185" y1="119" x2="185" y2="174" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
        <line x1="148" y1="147" x2="218" y2="147" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

        <!-- Tail boom — tapered -->
        <path d="M210 152 L272 142 L272 154 L210 166 Z" fill="#1a4a7a" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

        <!-- Tail vertical fin -->
        <path d="M268 142 L278 110 L284 142" fill="#163354" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

        <!-- Tail rotor -->
        <circle cx="278" cy="140" r="4" fill="#0f2340" stroke="#2d6ea8" stroke-width="1"/>
        <g>
          <rect x="275" y="120" width="6" height="40" rx="2" fill="rgba(15,35,64,0.6)"/>
          <rect x="258" y="137" width="40" height="6" rx="2" fill="rgba(15,35,64,0.6)"/>
          <animateTransform attributeName="transform" type="rotate"
            from="0 278 140" to="360 278 140" dur="0.35s" repeatCount="indefinite"/>
        </g>

        <!-- Skid assembly -->
        <line x1="118" y1="174" x2="108" y2="198" stroke="#1a4a7a" stroke-width="2"/>
        <line x1="182" y1="174" x2="192" y2="198" stroke="#1a4a7a" stroke-width="2"/>
        <!-- Cross braces -->
        <line x1="118" y1="174" x2="192" y2="174" stroke="rgba(15,35,64,0.15)" stroke-width="1"/>
        <!-- Skid tubes -->
        <rect x="96" y="196" width="108" height="5" rx="2.5" fill="#163354" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

        <!-- LONG LINE -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="0 150 198; 2 150 198; 0 150 198; -2 150 198; 0 150 198"
            dur="4.5s" repeatCount="indefinite" calcMode="spline"
            keySplines="0.45,0,0.55,1;0.45,0,0.55,1;0.45,0,0.55,1;0.45,0,0.55,1"/>

          <!-- Cable -->
          <line x1="150" y1="198" x2="150" y2="392" stroke="url(#cable-b)" stroke-width="2"/>

          <!-- Swivel — product highlight -->
          <rect x="137" y="266" width="26" height="54" rx="8" fill="#163354" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" filter="url(#shadow-b-soft)"/>
          <rect x="140" y="269" width="20" height="48" rx="6" fill="#1e4a7a"/>
          <!-- Swivel grooves -->
          <line x1="137" y1="280" x2="163" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
          <line x1="137" y1="290" x2="163" y2="290" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
          <line x1="137" y1="300" x2="163" y2="300" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
          <line x1="137" y1="310" x2="163" y2="310" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
          <!-- Pin ends -->
          <circle cx="150" cy="266" r="6" fill="#0f2340" stroke="#2d6ea8" stroke-width="1" filter="url(#shadow-b-soft)"/>
          <circle cx="150" cy="320" r="6" fill="#0f2340" stroke="#2d6ea8" stroke-width="1" filter="url(#shadow-b-soft)"/>

          <!-- Load box -->
          <rect x="120" y="392" width="60" height="46" rx="4" fill="#163354" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" filter="url(#shadow-b-soft)"/>
          <rect x="124" y="396" width="52" height="38" rx="3" fill="#1e4a7a"/>
          <!-- Load detail -->
          <line x1="120" y1="415" x2="180" y2="415" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
          <rect x="138" y="396" width="24" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>

          <!-- Rigging -->
          <line x1="130" y1="392" x2="130" y2="376" stroke="#163354" stroke-width="1.5"/>
          <line x1="170" y1="392" x2="170" y2="376" stroke="#163354" stroke-width="1.5"/>
          <line x1="130" y1="376" x2="170" y2="376" stroke="#163354" stroke-width="1.5"/>
          <line x1="150" y1="376" x2="150" y2="392" stroke="#163354" stroke-width="1.5"/>
        </g>
      </g>
    </svg>
  </div>


  <!-- ══════════════════════════════════════════
       OPTION C — LUXURY / GOLD / PREMIUM
  ══════════════════════════════════════════ -->
  <div class="panel panel-c">
    <div class="panel-label">C — Luxury</div>

    <svg viewBox="0 0 300 500" width="300" height="500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-c">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-c-strong">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="fuse-c" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a2a2e"/>
          <stop offset="100%" stop-color="#141416"/>
        </linearGradient>
        <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8d090"/>
          <stop offset="50%" stop-color="#c9a84c"/>
          <stop offset="100%" stop-color="#7a6230"/>
        </linearGradient>
        <linearGradient id="cable-c" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.9"/>
          <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.1"/>
        </linearGradient>
        <!-- Atmospheric glow behind heli -->
        <radialGradient id="atmos-c" cx="50%" cy="40%" r="40%">
          <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Atmospheric haze -->
      <rect width="300" height="500" fill="url(#atmos-c)"/>

      <!-- Subtle horizontal rules -->
      <line x1="0" y1="430" x2="300" y2="430" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
      <line x1="0" y1="440" x2="300" y2="440" stroke="rgba(201,168,76,0.04)" stroke-width="0.5"/>

      <!-- HELICOPTER -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 0,-10; 0,-18; 0,-8; 0,0"
          keyTimes="0; 0.25; 0.55; 0.8; 1"
